scan:
  url_limit: 250
  dap_page_size: 1000
  history_lookback_days: 31
  dashboard_display_days: 14
  traffic_window_mode: daily

impact:
  # Section 508 FPC-aligned prevalence rates derived from U.S. Census Bureau ACS 2023.
  # See src/data/census-disability-stats.js for full citations and per-category notes.
  # Review annually; next review: 2027-01-01
  prevalence_rates:
    WV: 0.010
    LV: 0.023
    WPC: 0.043
    WH: 0.003
    LH: 0.034
    WS: 0.005
    LM: 0.023
    LRS: 0.058
    LLCLA: 0.049
  severity_weights:
    critical: 1.0
    serious: 0.6
    moderate: 0.3
    minor: 0.1
  fallback_severity_weight: 0.2

sources:
  dap_top_pages_endpoints:
    - "https://api.gsa.gov/analytics/dap/v2.0.0/agencies/national-science-foundation/reports/site/data"
    - "https://api.gsa.gov/analytics/dap/v2.0.0/domain/nsf.gov/reports/site/data"
    - "https://api.gsa.gov/analytics/dap/v2.0.0/domain/new.nsf.gov/reports/site/data"
  analytics_public_endpoint: "https://analytics.usa.gov/data/live/national-science-foundation/top-pages-7-days.json"
